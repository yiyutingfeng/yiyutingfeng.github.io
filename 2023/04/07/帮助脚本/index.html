n><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Usage: python3 split_file.py &lt;filename&gt; &lt;output_prefix&gt;&quot;</span>)</span><br><span class="line">    exit()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取命令行参数</span></span><br><span class="line">filename = sys.argv[<span class="number">1</span>]</span><br><span class="line">output_prefix = sys.argv[<span class="number">2</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 定义文件分割标记</span></span><br><span class="line">split_mark = <span class="string">&quot;P0407&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 打开原始文件，读取所有行</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(filename, <span class="string">&quot;r&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">    lines = f.readlines()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 初始化输出文件序号和行数组</span></span><br><span class="line">part_idx = <span class="number">1</span></span><br><span class="line">part_lines = []</span><br><span class="line"></span><br><span class="line"><span class="comment"># 遍历每一行并分割文件</span></span><br><span class="line"><span class="keyword">for</span> line <span class="keyword">in</span> lines:</span><br><span class="line">    <span class="keyword">if</span> line.startswith(split_mark):</span><br><span class="line">        <span class="comment"># 如果当前行是分割标记，且上一个部分的行数大于等于 10，则输出该部分到文件中</span></span><br><span class="line">        <span class="keyword">if</span> <span class="built_in">len</span>(part_lines) &gt;= <span class="number">10</span>:</span><br><span class="line">            <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;<span class="subst">&#123;output_prefix&#125;</span><span class="subst">&#123;part_idx&#125;</span>&quot;</span>, <span class="string">&quot;w&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">                f.writelines(part_lines)</span><br><span class="line">            part_idx += <span class="number">1</span></span><br><span class="line">            part_lines = []</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            <span class="comment"># 如果上一个部分的行数小于 10，则直接清空行数组，不输出到文件中</span></span><br><span class="line">            part_lines = []</span><br><span class="line">    part_lines.append(line)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 处理最后一个部分</span></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(part_lines) &gt;= <span class="number">10</span>:</span><br><span class="line">    <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;<span class="subst">&#123;output_prefix&#125;</span><span class="subst">&#123;part_idx&#125;</span>&quot;</span>, <span class="string">&quot;w&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">        f.writelines(part_lines)</span><br></pre></td></tr></table></figure>

s="line"></span><br><span class="line"><span class="comment"># 获取命令行参数</span></span><br><span class="line">filename = sys.argv[<span class="number">1</span>]</span><br><span class="line">output_prefix = sys.argv[<span class="number">2</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 使用分割标记&quot;: &quot;对每一行进行分割并去除前后空格</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(filename, <span class="string">&#x27;r&#x27;</span>) <span class="keyword">as</span> f:</span><br><span class="line">    data = [line.strip().split(<span class="string">&quot;: &quot;</span>) <span class="keyword">for</span> line <span class="keyword">in</span> f.readlines()]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 构造输出表头</span></span><br><span class="line">headers = [i.strip() <span class="keyword">for</span> i <span class="keyword">in</span> data[<span class="number">0</span>]]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 去除表头内容前的其他无效字符</span></span><br><span class="line">headers[<span class="number">0</span>] = headers[<span class="number">0</span>].split(<span class="string">&quot; &quot;</span>)[-<span class="number">1</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 构造输出每行值</span></span><br><span class="line">values = []</span><br><span class="line"><span class="keyword">for</span> item <span class="keyword">in</span> data[<span class="number">1</span>:]:</span><br><span class="line">    values.append([i.strip() <span class="keyword">for</span> i <span class="keyword">in</span> item])</span><br><span class="line"></span><br><span class="line"><span class="comment">#输出csv文件</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;<span class="subst">&#123;output_prefix&#125;</span>.csv&quot;</span>, <span class="string">&#x27;w&#x27;</span>, newline=<span class="string">&#x27;&#x27;</span>) <span class="keyword">as</span> csvfile:</span><br><span class="line">    writer = csv.writer(csvfile)</span><br><span class="line">    writer.writerow(headers)</span><br><span class="line">    writer.writerows(values)</span><br><span class="line"></span><br><span class="line"><span class="built_in">print</span>(<span class="string">f&quot;CSV文件已保存到：<span class="subst">&#123;output_prefix&#125;</span>.csv&quot;</span>)</span><br></pre></td></tr></table></figure>

t;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line">input_file = sys.argv[<span class="number">1</span>]</span><br><span class="line">output_file = sys.argv[<span class="number">2</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 定义需要分割的标记</span></span><br><span class="line">separators = [<span class="string">&quot;: &quot;</span>]</span><br><span class="line"></span><br><span class="line">key_value_pairs = &#123;&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">try</span>:</span><br><span class="line">    <span class="comment"># 读取文件，分割出key value对</span></span><br><span class="line">    <span class="keyword">with</span> <span class="built_in">open</span>(input_file, <span class="string">&quot;r&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">        <span class="keyword">for</span> line <span class="keyword">in</span> f:</span><br><span class="line">            <span class="comment"># 去掉前后空格</span></span><br><span class="line">            line = line.strip()</span><br><span class="line">            <span class="comment"># 判断行是否符合要求，长度大于0且包含分割标记&quot;:&quot;+&quot;</span></span><br><span class="line">            <span class="keyword">if</span> <span class="built_in">len</span>(line) &gt; <span class="number">0</span> <span class="keyword">and</span> <span class="string">&quot;:&quot;</span> <span class="keyword">in</span> line:</span><br><span class="line">                <span class="keyword">for</span> sep <span class="keyword">in</span> separators:</span><br><span class="line">                    <span class="comment"># 如果分割标记在行中存在，则分割出key value对</span></span><br><span class="line">                    <span class="keyword">if</span> sep <span class="keyword">in</span> line:</span><br><span class="line">                        key, value = line.split(sep, <span class="number">1</span>)</span><br><span class="line">                        key = key.strip()</span><br><span class="line">                        <span class="comment"># 判断是否已经存在该key，如果存在，则将新的value添加到旧value后面</span></span><br><span class="line">                        <span class="keyword">if</span> key <span class="keyword">in</span> key_value_pairs:</span><br><span class="line">                            key_value_pairs[key] += <span class="string">&quot;,&quot;</span> + value.strip()</span><br><span class="line">                        <span class="keyword">else</span>:</span><br><span class="line">                            key_value_pairs[key] = value.strip()</span><br><span class="line">                        <span class="keyword">break</span></span><br><span class="line"><span class="keyword">except</span> FileNotFoundError:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Error: Input file not found.&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"><span class="keyword">except</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Error: Unable to read input file. Please check the file and try again.&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(key_value_pairs) == <span class="number">0</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Error: No valid key value pairs found in the input file.&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 将key value对写入输出文件</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(ou
