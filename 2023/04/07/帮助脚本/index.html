        <h3 id="用于分割profile"><a href="#用于分割profile" class="headerlink" title="用于分割profile"></a>用于分割profile</h3><figure class="highlight py"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#!/usr/bin/env python</span></span><br><span class="line"><span class="comment"># coding=utf-8</span></span><br><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"></span><br><span class="line"><span class="comment"># 检查命令行参数是否正确</span></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(sys.argv) != <span class="number">3</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Usage: python3 split_file.py &lt;filename&gt; &lt;output_prefix&gt;&quot;</span>)</span><br><span class="line">    exit()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取命令行参数</span></span><br><span class="line">filename = sys.argv[<span class="number">1</span>]</span><br><span class="line">output_prefix = sys.argv[<span class="number">2</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 定义文件分割标记</span></span><br><span class="line">split_mark = <span class="string">&quot;P0407&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 打开原始文件，读取所有行</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(filename, <span class="string">&quot;r&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">    lines = f.readlines()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 初始化输出文件序号和行数组</span></span><br><span class="line">part_idx = <span class="number">1</span></span><br><span class="line">part_lines = []</span><br><span class="line"></span><br><span class="line"><span class="comment"># 遍历每一行并分割文件</span></span><br><span class="line"><span class="keyword">for</span> line <span class="keyword">in</span> lines:</span><br><span class="line">    <span class="keyword">if</span> line.startswith(split_mark):</span><br><span class="line">        <span class="comment"># 如果当前行是分割标记，且上一个部分的行数大于等于 10，则输出该部分到文件中</span></span><br><span class="line">        <span class="keyword">if</span> <span class="built_in">len</span>(part_lines) &gt;= <span class="number">10</span>:</span><br><span class="line">            <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;<span class="subst">&#123;output_prefix&#125;</span><span class="subst">&#123;part_idx&#125;</span>&quot;</span>, <span class="string">&quot;w&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">                f.writelines(part_lines)</span><br><span class="line">            part_idx += <span class="number">1</span></span><br><span class="line">            part_lines = []</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            <span class="comment"># 如果上一个部分的行数小于 10，则直接清空行数组，不输出到文件中</span></span><br><span class="line">            part_lines = []</span><br><span class="line">    part_lines.append(line)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 处理最后一个部分</span></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(part_lines) &gt;= <span class="number">10</span>:</span><br><span class="line">    <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;<span class="subst">&#123;output_prefix&#125;</span><span class="subst">&#123;part_idx&#125;</span>&quot;</span>, <span class="string">&quot;w&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">        f.writelines(part_lines)</span><br></pre></td></tr></table></figure>


<figure class="highlight py"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#!/usr/bin/env python</span></span><br><span class="line"><span class="comment"># coding=utf-8</span></span><br><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"><span class="keyword">import</span> csv</span><br><span class="line"></span><br><span class="line"><span class="comment"># 检查命令行参数是否正确</span></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(sys.argv) != <span class="number">3</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Usage: python3 split_file.py &lt;filename&gt; &lt;output_prefix&gt;&quot;</span>)</span><br><span class="line">    exit()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取命令行参数</span></span><br><span class="line">filename = sys.argv[<span class="number">1</span>]</span><br><span class="line">output_prefix = sys.argv[<span class="number">2</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 使用分割标记&quot;: &quot;对每一行进行分割并去除前后空格</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(filename, <span class="string">&#x27;r&#x27;</span>) <span class="keyword">as</span> f:</span><br><span class="line">    data = [line.strip().split(<span class="string">&quot;: &quot;</span>) <span class="keyword">for</span> line <span class="keyword">in</span> f.readlines()]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 构造输出表头</span></span><br><span class="line">headers = [i.strip() <span class="keyword">for</span> i <span class="keyword">in</span> data[<span class="number">0</span>]]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 去除表头内容前的其他无效字符</span></span><br><span class="line">headers[<span class="number">0</span>] = headers[<span class="number">0</span>].split(<span class="string">&quot; &quot;</span>)[-<span class="number">1</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 构造输出每行值</span></span><br><span class="line">values = []</span><br><span class="line"><span class="keyword">for</span> item <span class="keyword">in</span> data[<span class="number">1</span>:]:</span><br><span class="line">    values.append([i.strip() <span class="keyword">for</span> i <span class="keyword">in</span> item])</span><br><span class="line"></span><br><span class="line"><span class="comment">#输出csv文件</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;<span class="subst">&#123;output_prefix&#125;</span>.csv&quot;</span>, <span class="string">&#x27;w&#x27;</span>, newline=<span class="string">&#x27;&#x27;</span>) <span class="keyword">as</span> csvfile:</span><br><span class="line">    writer = csv.writer(csvfile)</span><br><span class="line">    writer.writerow(headers)</span><br><span class="line">    writer.writerows(values)</span><br><span class="line"></span><br><span class="line"><span class="built_in">print</span>(<span class="string">f&quot;CSV文件已保存到：<span class="subst">&#123;output_prefix&#125;</span>.csv&quot;</span>)</span><br></pre></td></tr></table></figure>

<figure class="highlight py"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(sys.argv) &lt; <span class="number">3</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Usage: python script.py input_file output_file&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line">input_file = sys.argv[<span class="number">1</span>]</span><br><span class="line">output_file = sys.argv[<span class="number">2</span>]</span><br><span class="line"></span><br><span class="line"><span class="comment"># 定义需要分割的标记</span></span><br><span class="line">separators = [<span class="string">&quot;: &quot;</span>]</span><br><span class="line"></span><br><span class="line">key_value_pairs = &#123;&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">try</span>:</span><br><span class="line">    <span class="comment"># 读取文件，分割出key value对</span></span><br><span class="line">    <span class="keyword">with</span> <span class="built_in">open</span>(input_file, <span class="string">&quot;r&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">        <span class="keyword">for</span> line <span class="keyword">in</span> f:</span><br><span class="line">            <span class="comment"># 去掉前后空格</span></span><br><span class="line">            line = line.strip()</span><br><span class="line">            <span class="comment"># 判断行是否符合要求，长度大于0且包含分割标记&quot;:&quot;+&quot;</span></span><br><span class="line">            <span class="keyword">if</span> <span class="built_in">len</span>(line) &gt; <span class="number">0</span> <span class="keyword">and</span> <span class="string">&quot;:&quot;</span> <span class="keyword">in</span> line:</span><br><span class="line">                <span class="keyword">for</span> sep <span class="keyword">in</span> separators:</span><br><span class="line">                    <span class="comment"># 如果分割标记在行中存在，则分割出key value对</span></span><br><span class="line">                    <span class="keyword">if</span> sep <span class="keyword">in</span> line:</span><br><span class="line">                        key, value = line.split(sep, <span class="number">1</span>)</span><br><span class="line">                        key = key.strip()</span><br><span class="line">                        <span class="comment"># 判断是否已经存在该key，如果存在，则将新的value添加到旧value后面</span></span><br><span class="line">                        <span class="keyword">if</span> key <span class="keyword">in</span> key_value_pairs:</span><br><span class="line">                            key_value_pairs[key] += <span class="string">&quot;,&quot;</span> + value.strip()</span><br><span class="line">                        <span class="keyword">else</span>:</span><br><span class="line">                            key_value_pairs[key] = value.strip()</span><br><span class="line">                        <span class="keyword">break</span></span><br><span class="line"><span class="keyword">except</span> FileNotFoundError:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Error: Input file not found.&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"><span class="keyword">except</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Error: Unable to read input file. Please check the file and try again.&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> <span class="built_in">len</span>(key_value_pairs) == <span class="number">0</span>:</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&quot;Error: No valid key value pairs found in the input file.&quot;</span>)</span><br><span class="line">    sys.exit(<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 将key value对写入输出文件</span></span><br><span class="line"><span class="keyword">with</span> <span class="built_in">open</span>(ou span> forth <span class="keyword">in</span> the BONC commercial license agreement.     <span class="comment">#</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">                                                                     <span class="comment">#</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">  @@END_INTERNAL_LEGAL@@                                             <span class="comment">#</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">                                                                     <span class="comment">#</span></span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash"><span class="comment">#######################################################################</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">File Name: initialize.sh</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">File Version: 1.0</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Description:</span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash"><span class="comment">#######################################################################</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Modify History:</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">  1. Modify Time: Jan 31, 2023 04:00:55 PM</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">  Author: gaoyuanfeng</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">  Description: Creation</span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash"><span class="comment">#######################################################################</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash">!/bin/bash</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">支持单节点或多节点配置kv组件</span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash"></span></span><br><span class="line"><span class="language-bash"><span class="comment"># 单节点配置要求:</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ARBITER_RPC_PORT 与 CARRIER_RPC_PORT 分别至少配置3个端口号, IP个数仅配置1个</span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash"></span></span><br><span class="line"><span class="language-bash"><span class="comment"># 多节点配置要求:</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ARBITER_RPC_PORT 与 CARRIER_RPC_PORT 分别仅配置1个端口号, IP个数至少配置3个</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">每个节点下的该脚本配置需一致</span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">arbiter rpc_port 需修改</span></span><br><span class="line">ARBITER_RPC_PORT=(15353 15354 15355)</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">carrier rpc_port 需修改</span></span><br><span class="line">CARRIER_RPC_PORT=(15356 15357 15358)</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">kv部署节点,至少3个节点,需修改,不填表示仅在当前节点配置kv组件</span></span><br><span class="line">IP=()</span><br><span class="line"></span><br><span class="line">case $1 in</span><br><span class="line">    h|help)</span><br><span class="line">        echo &quot;部署kv组件:&quot;</span><br><span class="line">        echo &quot;    执行 ./initialize.sh&quot;</span><br><span class="line">        echo &quot;    注意:首次执行需要修改&#x27;initialize.sh&#x27;内&#x27;ARBITER_RPC_PORT&#x27;,&#x27;CARRIER_RPC_PORT&#x27;和&#x27;IP&#x27;三个参数&quot;</span><br><span class="line">        echo &quot;查看kv组件状态:&quot;</span><br><span class="line">        echo &quot;    执行 ./initialize.sh status&quot;</span><br><span class="line">        echo &quot;停掉kv服务:&quot;</span><br><span class="line">        echo &quot;    执行 ./initialize.sh stop&quot;</span><br><span class="line">        echo &quot;清理kv数据:&quot;</span><br><span class="line">        echo &quot;    执行 ./initialize.sh clean&quot;</span><br><span class="line">        echo &quot;更新kv组件:&quot;</span><br><span class="line">        echo &quot;    先执行 ./initialize.sh update&quot;</span><br><span class="line">        echo &quot;    再复制kv包到当前目录&quot;</span><br><span class="line">        echo &quot;    最后执行 ./initialize.sh&quot;</span><br><span class="line">        exit 0</span><br><span class="line">        ;;</span><br><span class="line">esac</span><br><span class="line"></span><br><span class="line">KV_DIR_NAME=CirroKV</span><br><span class="line">KV_DIR=(`find . -name &quot;$&#123;KV_DIR_NAME&#125;&quot;`)</span><br><span class="line">for ((i = 0; i !=$&#123;#KV_DIR[@]&#125;; ++i ))</span><br><span class="line">do</span><br><span class="line">    case $1 in</span><br><span class="line">        # 查看kv状态</span><br><span class="line">        status)</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/ckv-admin.sh arbiter list</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/ckv-admin.sh carrier list</span><br><span class="line">            exit 0</span><br><span class="line">            ;;</span><br><span class="line">        # 停掉kv</span><br><span class="line">        stop)</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/stop-ckv.sh --arbiter=1</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/stop-ckv.sh --carrier=1</span><br><span class="line">            ;;</span><br><span class="line">        # 清理kv</span><br><span class="line">        clean)</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/stop-ckv.sh --arbiter=1</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/stop-ckv.sh --carrier=1</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/clean-ckv.sh --all=1</span><br><span class="line">            ;;</span><br><span class="line">        # 更新kv组件前的操作</span><br><span class="line">        update)</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/stop-ckv.sh --arbiter=1</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/stop-ckv.sh --carrier=1</span><br><span class="line">            $&#123;KV_DIR[$&#123;i&#125;]&#125;/clean-ckv.sh --all=1</span><br><span class="line">            rm -rf $&#123;KV_DIR[$&#123;i&#125;]&#125;</span><br><span class="line">            mkdir kv_bak 2&gt;/dev/null</span><br><span class="line">            mv $&#123;KV_DIR_NAME&#125;-* kv_bak/ 2&gt;/dev/null</span><br><span class="line">            ;;</span><br><span class="line">    esac</span><br><span class="line">done</span><br><span class="line"></span><br><span class="line">if [[ $# -gt 0 ]]</span><br><span class="line">then</span><br><span class="line">    exit 0</span><br><span class="line">fi</span><br><span class="line"></span><br><span class="line">LOCAL_NODE=(`hostname -i`)</span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">LOCAL_HOST=`hostname`</span></span><br><span class="line">if [[ $&#123;#IP[@]&#125; -eq 0 ]]</span><br><span class="line">then</span><br><span class="line">    # 没有填IP,说明是单节点配多kv,获取当前节点IP</span><br><span class="line">    IP=($&#123;LOCAL_NODE[0]&#125;)</span><br><span class="line">fi</span><br><span class="line"></span><br><span class="line">HOME=`pwd`</span><br><span class="line">KV_DIRS=()</span><br><span class="line">IP_SIZE=$&#123;#IP[@]&#125;</span><br><span class="line">ARBITER_SIZE=$&#123;#ARBITER_RPC_PORT[@]&#125;</span><br><span class="line">CARRIER_SIZE=$&#123;#CARRIER_RPC_PORT[@]&#125;</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ip数为1,端口数不小于3,即单节点多kv</span></span><br><span class="line">if [[ $&#123;IP_SIZE&#125; -le 1 ]] &amp;&amp; [[ $&#123;ARBITER_SIZE&#125; -eq $&#123;CARRIER_SIZE&#125; ]] &amp;&amp; [[ $&#123;ARBITER_SIZE&#125; -ge 3 ]] &amp;&amp; [[ $&#123;CARRIER_SIZE&#125; -ge 3 ]]</span><br><span class="line">then</span><br><span class="line">    for ((i = 0; i != $&#123;#ARBITER_RPC_PORT[@]&#125;; ++i))</span><br><span class="line">    do</span><br><span class="line">        # kv目录</span><br><span class="line">        KV_DIRS=($&#123;KV_DIRS[*]&#125; $&#123;HOME&#125;/kv_store_$&#123;i&#125;)</span><br><span class="line">    done</span><br><span class="line">elif [[ $&#123;IP_SIZE&#125; -ge 3 ]] &amp;&amp; [[ $&#123;ARBITER_SIZE&#125; -eq $&#123;CARRIER_SIZE&#125; ]] &amp;&amp; [[ $&#123;ARBITER_SIZE&#125; -eq 1 ]] &amp;&amp; [[ $&#123;CARRIER_SIZE&#125; -eq 1 ]]</span><br><span class="line">then</span><br><span class="line">    KV_DIRS=($&#123;HOME&#125;)</span><br><span class="line">else</span><br><span class="line">    echo &quot;请检查配置是否正确&quot;</span><br><span class="line">    exit -1</span><br><span class="line">fi</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">kv数据目录</span></span><br><span class="line">ARBITER_DATA_DIR=(.ab_data .ab_wal)</span><br><span class="line">CARRIER_DATA_DIR=(.cr_data .cr_wal .cr_conf)</span><br><span class="line">KV_DATA_DIR=($&#123;ARBITER_DATA_DIR[*]&#125; $&#123;CARRIER_DATA_DIR[*]&#125;)</span><br><span class="line"></span><br><span class="line">for ((i = 0; i != $&#123;#KV_DIRS[@]&#125;; ++i))</span><br><span class="line">do</span><br><span class="line">    # 创建wal数据目录</span><br><span class="line">    for (( j = 0; j != $&#123;#KV_DATA_DIR[@]&#125;; ++j))</span><br><span class="line">    do</span><br><span class="line">        mkdir -p $&#123;KV_DIRS[$&#123;i&#125;]&#125;/$&#123;KV_DATA_DIR[$&#123;j&#125;]&#125; 2&gt;/dev/null</span><br><span class="line">    done</span><br><span class="line"></span><br><span class="line">    # 若无CirroKV目录则需要解压kv压缩包</span><br><span class="line">    if [ `find $&#123;KV_DIRS[$&#123;i&#125;]&#125; -maxdepth 1 -name $&#123;KV_DIR_NAME&#125; | wc -l` -eq 0 ]</span><br><span class="line">    then</span><br><span class="line">        tar xvfz $&#123;KV_DIR_NAME&#125;-release* -C $&#123;KV_DIRS[$&#123;i&#125;]&#125;</span><br><span class="line">    fi</span><br><span class="line">done</span><br><span class="line"></span><br><span class="line">PORT=($&#123;ARBITER_RPC_PORT[*]&#125; $&#123;CARRIER_RPC_PORT[*]&#125;)</span><br><span class="line">SERVER=arbiter</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">检查端口是否被占用</span></span><br><span class="line">for ((i = 0, j = 0; i != $&#123;#PORT[@]&#125;; ++i, ++j))</span><br><span class="line">do</span><br><span class="line">    if [ $&#123;i&#125; -eq $&#123;ARBITER_SIZE&#125; ]</span><br><span class="line">    then</span><br><span class="line">        SERVER=carrier</span><br><span class="line">        j=0</span><br><span class="line">    fi</span><br><span class="line"></span><br><span class="line">    cd $&#123;KV_DIRS[$&#123;j&#125;]&#125;/$&#123;KV_DIR_NAME&#125;</span><br><span class="line"></span><br><span class="line">    # kv 服务未启动情况下,端口被占用,提示端口占用并退出</span><br><span class="line">    if  [[ `./process-status.sh --$&#123;SERVER&#125; | grep -c &quot;false&quot;` -gt 0 ]] &amp;&amp; [[ `netstat -ant | grep -c $&#123;PORT[$&#123;i&#125;]&#125;` -gt 0 ]]</span><br><span class="line">    then</span><br><span class="line">        echo &quot;$&#123;PORT[$&#123;i&#125;]&#125;端口可能还未释放,10后重试...&quot;</span><br><span class="line">        TIME=0</span><br><span class="line">        # 停掉kv服务后,端口不会立刻释放,所以添加60s重试时间,等待端口释放</span><br><span class="line">        while [[ $&#123;TIME&#125; -lt 60 ]] &amp;&amp; [[ &quot;$(netstat -ant | grep -c $&#123;PORT[$&#123;i&#125;]&#125;)&quot; -gt 0 ]]</span><br><span class="line">        do</span><br><span class="line">            ((TIME=TIME+10))</span><br><span class="line">            sleep 10</span><br><span class="line">            echo &quot;10s后再次重试...&quot;</span><br><span class="line">        done</span><br><span class="line"></span><br><span class="line">        if [ &quot;$(netstat -ant | grep -c $&#123;PORT[$&#123;i&#125;]&#125;)&quot; -gt 0 ]</span><br><span class="line">        then</span><br><span class="line">            echo -e &quot;\e[31m$&#123;PORT[$&#123;i&#125;]&#125;端口已被占用,请更换端口号\e[0m&quot;</span><br><span class="line">            exit -1</span><br><span class="line">        fi</span><br><span class="line">    fi</span><br><span class="line">done</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">arbiter 需配置的参数</span></span><br><span class="line">ARBITER_KEY=(rpc_port arbiter_addr_list data_dir wal_dir)</span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">carrier 需配置的参数</span></span><br><span class="line">CARRIER_KEY=(rpc_port arbiter_addr_list conf_dir data_dir wal_dir)</span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ckv-admin 需配置的参数</span></span><br><span class="line">CKV_ADMIN_KEY=ckv_admin_arbiter_address_list</span><br><span class="line">KEY=($&#123;ARBITER_KEY[*]&#125; $&#123;CARRIER_KEY[*]&#125; $&#123;CKV_ADMIN_KEY&#125;)</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">需修改的配置文件</span></span><br><span class="line">FILE=(conf/config_arbiter.xml conf/config_carrier.xml ckv-admin/config_ckv_admin.xml)</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">配置参数arbiter_addr_list</span></span><br><span class="line">ADDR_LIST=&quot;&quot;</span><br><span class="line"></span><br><span class="line">for ((i = 0; i != $&#123;#IP[@]&#125;; ++i))</span><br><span class="line">do</span><br><span class="line">    # 获取ip对应的hostname</span><br><span class="line">    HOST_NAME=(`grep -a $&#123;IP[$[i]]&#125; /etc/hosts`)</span><br><span class="line">    if [[ $&#123;HOST_NAME[1]&#125; ]]</span><br><span class="line">    then</span><br><span class="line">        for ((j = 0; j != ARBITER_SIZE; ++j))</span><br><span class="line">        do</span><br><span class="line">            ADDR_LIST=&quot;$&#123;ADDR_LIST&#125;$&#123;HOST_NAME[1]&#125;:$&#123;ARBITER_RPC_PORT[$&#123;j&#125;]&#125;,&quot;</span><br><span class="line">        done</span><br><span class="line">    else</span><br><span class="line">        echo &quot;/etc/hosts中找不到$&#123;IP[$[i]]&#125;对应的hostname&quot;</span><br><span class="line">        exit -1;</span><br><span class="line">    fi</span><br><span class="line">done</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">去除末尾<span class="string">&#x27;,&#x27;</span></span></span><br><span class="line">ADDR_LIST=$&#123;ADDR_LIST%?&#125;</span><br><span class="line">POS=0</span><br><span class="line"></span><br><span class="line">for ((a = 0; a != $&#123;#KV_DIRS[@]&#125;; ++a))</span><br><span class="line">do</span><br><span class="line">    cd $&#123;KV_DIRS[$&#123;a&#125;]&#125;/$&#123;KV_DIR_NAME&#125;</span><br><span class="line"></span><br><span class="line">    # 若arbiter或carrier未启动,依次修改配置参数</span><br><span class="line">    if [ $(./process-status.sh --arbiter | grep -c &quot;false&quot;) -gt 0 ] || [ $(./process-status.sh --carrier | grep -c &quot;false&quot;) -gt 0 ]</span><br><span class="line">    then</span><br><span class="line">        for ((i = 0; i != $&#123;#KEY[@]&#125;; ++i))</span><br><span class="line">        do</span><br><span class="line">            if [ $&#123;i&#125; -eq $&#123;#ARBITER_KEY[@]&#125; ]</span><br><span class="line">            then</span><br><span class="line">                POS=1</span><br><span class="line">            fi</span><br><span class="line"></span><br><span class="line">            if [ $&#123;i&#125; -eq `expr $&#123;#ARBITER_KEY[@]&#125; + $&#123;#CARRIER_KEY[@]&#125;` ]</span><br><span class="line">            then</span><br><span class="line">                POS=2</span><br><span class="line">            fi</span><br><span class="line"></span><br><span class="line">            # 需修改的参数所在行号</span><br><span class="line">            LINE=$(grep -nA10 &quot;&gt;$&#123;KEY[$&#123;i&#125;]&#125;&quot; $&#123;FILE[$&#123;POS&#125;]&#125; | grep &quot;current&quot; | cut -d &#x27;-&#x27; -f 1)</span><br><span class="line">            # 需修改参数的原内容</span><br><span class="line">            MODIFY=$(grep -A10 $&#123;KEY[$&#123;i&#125;]&#125; $&#123;FILE[$&#123;POS&#125;]&#125; | grep &quot;current&quot; | sed -e &#x27;s/^[ ]*//g&#x27;)</span><br><span class="line"></span><br><span class="line">            case $&#123;KEY[$&#123;i&#125;]&#125; in</span><br><span class="line">                rpc_port)</span><br><span class="line">                    if [ $&#123;POS&#125; -eq 0 ]</span><br><span class="line">                    then</span><br><span class="line">                        sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;ARBITER_RPC_PORT[$&#123;a&#125;]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    elif [ $&#123;POS&#125; -eq 1 ]</span><br><span class="line">                    then</span><br><span class="line">                        sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;CARRIER_RPC_PORT[$&#123;a&#125;]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    fi</span><br><span class="line">                    ;;</span><br><span class="line">                arbiter_addr_list)</span><br><span class="line">                    sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;ADDR_LIST&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    ;;</span><br><span class="line">                conf_dir)</span><br><span class="line">                    sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;KV_DIRS[$&#123;a&#125;]&#125;/$&#123;CARRIER_DATA_DIR[2]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    ;;</span><br><span class="line">                data_dir)</span><br><span class="line">                    if [ $&#123;POS&#125; -eq 0 ]</span><br><span class="line">                    then</span><br><span class="line">                        sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;KV_DIRS[$&#123;a&#125;]&#125;/$&#123;ARBITER_DATA_DIR[0]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    elif [ $&#123;POS&#125; -eq 1 ]</span><br><span class="line">                    then</span><br><span class="line">                        sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;KV_DIRS[$&#123;a&#125;]&#125;/$&#123;CARRIER_DATA_DIR[0]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    fi</span><br><span class="line">                    ;;</span><br><span class="line">                wal_dir)</span><br><span class="line">                    if [ $&#123;POS&#125; -eq 0 ]</span><br><span class="line">                    then</span><br><span class="line">                        sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;KV_DIRS[$&#123;a&#125;]&#125;/$&#123;ARBITER_DATA_DIR[1]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    elif [ $&#123;POS&#125; -eq 1 ]</span><br><span class="line">                    then</span><br><span class="line">                        sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;KV_DIRS[$&#123;a&#125;]&#125;/$&#123;CARRIER_DATA_DIR[1]&#125;&lt;/current&gt;|g&quot; $&#123;FILE[$&#123;POS&#125;]&#125;</span><br><span class="line">                    fi</span><br><span class="line">                    ;;</span><br><span class="line">                ckv_admin_arbiter_address_list)</span><br><span class="line">                    sed -i &quot;$&#123;LINE&#125;,$&#123;LINE&#125;s|$&#123;MODIFY&#125;|&lt;current&gt;$&#123;ADDR_LIST&#125;&lt;/current&gt;|g&quot; $&#123;FILE[2]&#125;</span><br><span class="line">                    ;;</span><br><span class="line">            esac</span><br><span class="line">        done</span><br><span class="line">    fi</span><br><span class="line">    POS=0</span><br><span class="line"></span><br><span class="line">    # 启动arbiter</span><br><span class="line">    if [  $(./process-status.sh --arbiter | grep -c &quot;false&quot;) -gt 0 ]</span><br><span class="line">    then</span><br><span class="line">        ./start-ckv.sh --arbiter=1</span><br><span class="line">    fi</span><br><span class="line"></span><br><span class="line">    # 启动carrier</span><br><span class="line">    if [  $(./process-status.sh --carrier | grep -c &quot;false&quot;) -gt 0 ]</span><br><span class="line">    then</span><br><span class="line">        ./start-ckv.sh --carrier=1</span><br><span class="line">    fi</span><br><span class="line">done</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">查看arbiter状态</span></span><br><span class="line">./ckv-admin.sh arbiter list</span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">查看carrier状态</span></span><br><span class="line">./ckv-admin.sh carrier list</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">打印参数值,方便复制</span></span><br><span class="line">echo -e &quot;CirroEngine配置参数 client_arbiter_address_list: \e[1;32m$&#123;ADDR_LIST&#125;\e[0m&quot;</span><br></pre></td></tr></table></figure>
